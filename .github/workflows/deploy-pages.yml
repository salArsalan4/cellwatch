name: Deploy dashboard to GitHub Pages

# Publishes only the frontend/ directory as the Pages site, so the dashboard
# is served at the site root (…/cellwatch/) rather than a /frontend/ subpath.
# GitHub Pages branch-source can only publish the repo root or /docs; this
# custom workflow lifts that restriction by uploading frontend/ as the artifact.

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run supersede an in-progress one, but don't cancel a run
# that's mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - id: deployment
        uses: actions/deploy-pages@v4
